# Cloudflare Worker (static assets + /api/book) — config for Workers Builds.
# When you connect this repo in the Cloudflare dashboard (Workers & Pages →
# Create → Import a repository), Cloudflare reads this file to build & deploy.

name = "singlecell-planner"
main = "worker.js"
compatibility_date = "2026-07-01"

# Serve the whole repo as the static site; the Worker (worker.js) intercepts
# /api/book and passes everything else to these assets via env.ASSETS.
[vars]
INVENTORY_SHEET_ID = "1EXC2kdreRnWj5c3ONbNO5US4RI6iWHedCL3SDJxrgbw"
EXPERIMENTS_SHEET_ID = "1Qu5QmAi6Z3KPhkBgsCTwWyuninEOComk3EhBZ06huGA"
[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
